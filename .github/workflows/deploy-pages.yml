name: Deploy pages folder to GitHub Pages

on:
  push:
    branches:
      - main    # change if your default branch is different
      
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If your site is static HTML/CSS/JS already in pages/, you don't need a build step.
      # If you have a build step, run it here and output into pages/.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public   # <--- this is your folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
