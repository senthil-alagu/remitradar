name: Fetch Exchange Rates

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch-rates:
    name: Fetch and update rates
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Fetch rates
        working-directory: scraper
        env:
          WISE_API_KEY: ${{ secrets.WISE_API_KEY }}
        run: node fetch_rates.js
        continue-on-error: true

      - name: Commit updated rates
        run: |
          git config user.name "RemitRadar Bot"
          git config user.email "bot@remiradar.com"
          git add public/rates.json
          git diff --staged --quiet || g
